name: Scheduled update

on:
  schedule:
    # 4×/day at :17 past the hour to avoid the :00 cron herd.
    # 00:17, 06:17, 12:17, 18:17 UTC.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump nix-update pin
        run: |
          set -u
          PIN=packages/.nix-update-version
          CURRENT=$(cat "$PIN")
          LATEST=$(curl -fsSL -H 'Accept: application/vnd.github+json' \
            https://api.github.com/repos/Mic92/nix-update/releases/latest 2>/dev/null \
            | jq -r .tag_name 2>/dev/null) || LATEST=""
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::warning::Could not determine latest nix-update tag, keeping $CURRENT"
            exit 0
          fi
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "nix-update pin up to date at $CURRENT"
            exit 0
          fi
          echo "Smoke-testing nix-update $LATEST..."
          if nix run "github:Mic92/nix-update/${LATEST}" -- --help >/dev/null 2>&1; then
            echo "Bumping nix-update pin: $CURRENT -> $LATEST"
            printf '%s\n' "$LATEST" > "$PIN"
          else
            echo "::warning::nix-update $LATEST failed smoke test, keeping $CURRENT"
          fi

      - name: Run package updaters
        run: |
          for pkg in claude-code kagi-cli kvitals nats-desktop openshift slumber; do
            echo "::group::Updating $pkg"
            if ./packages/$pkg/update.sh; then
              echo "$pkg update succeeded"
            else
              echo "::warning::$pkg update failed"
            fi
            echo "::endgroup::"
          done

      - name: Update flake.lock
        run: nix flake update

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git add -A
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore: scheduled update $DATE" -m "Files changed: $CHANGED"
          git push
